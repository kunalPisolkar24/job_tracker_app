[theme]
base = "light"
primaryColor = "#4F46E5"
backgroundColor = "#F9FAFB"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#111827"
font = "sans serif"
borderColor = "#D1D5DB"
showSidebarBorder = true

[theme.sidebar]
primaryColor = "#4F46E5"
backgroundColor = "#EEF2FF"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#111827"
borderColor = "#C7D2FE"

[theme.dark]
primaryColor = "#818CF8"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#1E293B"
textColor = "#E2E8F0"
borderColor = "#334155"

[theme.dark.sidebar]
primaryColor = "#818CF8"
backgroundColor = "#111827"
secondaryBackgroundColor = "#1F2937"
textColor = "#E5E7EB"
borderColor = "#374151"
